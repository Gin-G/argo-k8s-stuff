# hostNetwork so HA can hear mDNS/SSDP multicast for device auto-discovery
hostNetwork: true
dnsPolicy: ClusterFirstWithHostNet

# hostNetwork binds 8123 to the node, so pin to one node for a stable IP
# (webhooks/HomeKit pairings break if the pod moves between nodes)
nodeSelector:
  kubernetes.io/hostname: gingworker

# no deploymentStrategy needed: with persistence enabled the chart renders a
# StatefulSet, which deletes the old pod before creating the new one, so old +
# new pods never race to bind 8123 on the pinned node

# custom integrations are cloned into an emptyDir on each pod start and
# mounted over /config/custom_components/<name> (chart's documented pattern,
# since the stock HA image has no HACS)
initContainers:
  - name: init-meross-lan
    image: alpine/git
    command: ["/bin/sh", "-c"]
    args:
      - |
        git clone --depth 1 --branch v5.8.0 https://github.com/krahabb/meross_lan.git /git/meross_lan
        cp -r /git/meross_lan/custom_components/meross_lan/* /meross_lan
        chown -R 1000:1000 /meross_lan
    volumeMounts:
      - name: custom-components-meross
        mountPath: /meross_lan
  - name: init-hubspace
    image: alpine/git
    command: ["/bin/sh", "-c"]
    args:
      - |
        git clone --depth 1 --branch v6.0.1 https://github.com/jdeath/Hubspace-Homeassistant.git /git/hubspace
        cp -r /git/hubspace/custom_components/hubspace/* /hubspace
        chown -R 1000:1000 /hubspace
    volumeMounts:
      - name: custom-components-hubspace
        mountPath: /hubspace
  - name: init-ha-hatch
    image: alpine/git
    command: ["/bin/sh", "-c"]
    args:
      - |
        git clone --depth 1 --branch v1.30.0 https://github.com/dahlb/ha_hatch.git /git/ha_hatch
        cp -r /git/ha_hatch/custom_components/ha_hatch/* /ha_hatch
        chown -R 1000:1000 /ha_hatch
    volumeMounts:
      - name: custom-components-ha-hatch
        mountPath: /ha_hatch

additionalVolumes:
  - name: custom-components-meross
    emptyDir: {}
  - name: custom-components-hubspace
    emptyDir: {}
  - name: custom-components-ha-hatch
    emptyDir: {}
  # long-term storage for Nest event clips (PVC from manifests/home-assistant)
  - name: nest-media
    persistentVolumeClaim:
      claimName: home-assistant-media

additionalMounts:
  - mountPath: /config/custom_components/meross_lan
    name: custom-components-meross
  - mountPath: /config/custom_components/hubspace
    name: custom-components-hubspace
  - mountPath: /config/custom_components/ha_hatch
    name: custom-components-ha-hatch
  - mountPath: /media
    name: nest-media

ingress:
  enabled: true
  className: traefik
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-cloudflare"
    external-dns.alpha.kubernetes.io/target: "8.44.158.127"
  hosts:
    - host: home.nickknows.net
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: home-assistant-tls
      hosts:
        - home.nickknows.net

persistence:
  enabled: true
  storageClass: rook-ceph-block
  accessMode: ReadWriteOnce
  size: 5Gi

configuration:
  enabled: true
  # merge templateConfig into the existing configuration.yaml on every start
  # (required so the shell_command/automation additions below reach the running
  # config; the init script backs up the previous file and keeps 10 backups)
  forceInit: true
  # without trusted_proxies HA returns HTTP 400 for requests proxied through Traefik
  trusted_proxies:
    - 10.0.0.0/8
    - 127.0.0.1
    - 192.168.5.120
    - 192.168.4.57
  # chart's default templateConfig, plus Nest clip archiving:
  # the Nest integration caches event clips in /config/.cache/nest/event_media
  # but prunes them at its own storage limits, so we copy new clips to the
  # /media PVC every 15 minutes and delete archived clips older than 30 days
  templateConfig: |-
    # Loads default set of integrations. Do not remove.
    default_config:

    {{- if .Values.serviceMonitor.enabled }}
    prometheus:
    {{- end }}

    {{- if or .Values.ingress.enabled .Values.ingress.external }}
    http:
      use_x_forwarded_for: true
      trusted_proxies:
        {{- range .Values.configuration.trusted_proxies }}
        - {{ . }}
        {{- end }}
    {{- end}}
    # Load frontend themes from the themes folder
    frontend:
      themes: !include_dir_merge_named themes

    automation: !include automations.yaml
    script: !include scripts.yaml
    scene: !include scenes.yaml

    shell_command:
      archive_nest_clips: mkdir -p /media/nest && cp -rn /config/.cache/nest/event_media/. /media/nest/ || true
      cleanup_nest_clips: find /media/nest -type f -mtime +30 -delete

    automation nest_clip_archive:
      - alias: Archive Nest event clips to /media
        trigger:
          - platform: time_pattern
            minutes: "/15"
        action:
          - service: shell_command.archive_nest_clips
      - alias: Delete archived Nest clips older than 30 days
        trigger:
          - platform: time
            at: "03:30:00"
        action:
          - service: shell_command.cleanup_nest_clips
