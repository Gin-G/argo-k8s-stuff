# hostNetwork so HA can hear mDNS/SSDP multicast for device auto-discovery
hostNetwork: true
dnsPolicy: ClusterFirstWithHostNet

# hostNetwork binds 8123 to the node, so pin to one node for a stable IP
# (webhooks/HomeKit pairings break if the pod moves between nodes)
nodeSelector:
  kubernetes.io/hostname: gingworker

# no deploymentStrategy needed: with persistence enabled the chart renders a
# StatefulSet, which deletes the old pod before creating the new one, so old +
# new pods never race to bind 8123 on the pinned node

# custom integrations are cloned into an emptyDir on each pod start and
# mounted over /config/custom_components/<name> (chart's documented pattern,
# since the stock HA image has no HACS)
initContainers:
  - name: init-meross-lan
    image: alpine/git
    command: ["/bin/sh", "-c"]
    args:
      - |
        git clone --depth 1 --branch v5.8.0 https://github.com/krahabb/meross_lan.git /git/meross_lan
        cp -r /git/meross_lan/custom_components/meross_lan/* /meross_lan
        chown -R 1000:1000 /meross_lan
    volumeMounts:
      - name: custom-components
        mountPath: /meross_lan

additionalVolumes:
  - name: custom-components
    emptyDir: {}

additionalMounts:
  - mountPath: /config/custom_components/meross_lan
    name: custom-components

ingress:
  enabled: true
  className: traefik
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-cloudflare"
    external-dns.alpha.kubernetes.io/target: "8.44.158.127"
  hosts:
    - host: home.nickknows.net
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: home-assistant-tls
      hosts:
        - home.nickknows.net

persistence:
  enabled: true
  storageClass: rook-ceph-block
  accessMode: ReadWriteOnce
  size: 5Gi

configuration:
  enabled: true
  # without trusted_proxies HA returns HTTP 400 for requests proxied through Traefik
  trusted_proxies:
    - 10.0.0.0/8
    - 127.0.0.1
    - 192.168.5.120
    - 192.168.4.57
