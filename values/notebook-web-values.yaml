ingress:
  enabled: true
  ingressClassName: nginx
  host: "notebooks.nickknows.net"
  annotations: {
      nginx.ingress.kubernetes.io/ssl-redirect: "true",
      nginx.ingress.kubernetes.io/ssl-passthrough: "false",
      cert-manager.io/cluster-issuer: "letsencrypt-cloudflare",
      kubernetes.io/ingress-class: nginx,
      external-dns.alpha.kubernetes.io/target: "8.44.158.127"}
  tls:
    - secretName: notebooks-tls
      hosts:
        - notebooks.nickknows.net
notebooks:
  - name: "CESM-LENS"
    repo: "https://github.com/ProjectPythia/cesm-lens-aws-cookbook.git"
    ref: "main"
    path: "notebooks"
    envFile: "environment.yml"  # explicit conda env; omit to auto-discover
    description: "Exploratory analysis of global surface temperature datasets"
    tags: ["python", "climate", "pandas"]
    resources:
      limits:
        cpu: "2"
        memory: "4Gi"
      requests:
        cpu: "500m"
        memory: "1Gi"

  - name: "Machine Learning Basics"
    repo: "https://github.com/Unidata/supervised-ml-readiness.git"
    ref: "main"
    path: "02_MachineLearningApplications/MachineLearningApplications.ipynb"
    envFile: "environment.yml"  # explicit conda env; omit to auto-discover
    description: "Introduction to scikit-learn: classification, regression, and evaluation"
    tags: ["python", "machine-learning", "scikit-learn"]

  - name: "GDEX OSDF Examples"
    repo: https://github.com/NCAR/osdf-examples.git
    ref: "main"
    path: notebooks
    envFile: ""
    description: "Examples on accessing GDEX datasets via OSDF"
    tags: ["python", "data-access"]

build:
  enabled: true
  registry: harbor.nickknows.net/notebooks/sessions
  pushSecretName: harbor-notebooks-push
  # buildkitServiceName: ""  # auto: <release>-buildkit-service
