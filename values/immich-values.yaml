controllers:
  main:
    containers:
      main:
        image:
          tag: v2.5.2
        env:
          DB_HOSTNAME: immich-database-rw
          DB_PORT: "5432"
          DB_DATABASE_NAME: immich
          DB_USERNAME:
            valueFrom:
              secretKeyRef:
                name: immich-db-credentials
                key: username
          DB_PASSWORD:
            valueFrom:
              secretKeyRef:
                name: immich-db-credentials
                key: password

valkey:
  enabled: true

immich:
  persistence:
    library:
      existingClaim: immich-library

machine-learning:
  enabled: true
  persistence:
    cache:
      enabled: true
      size: 10Gi
      storageClass: rook-ceph-block

server:
  ingress:
    main:
      enabled: true
      annotations:
        nginx.ingress.kubernetes.io/proxy-body-size: "0"
        cert-manager.io/cluster-issuer: "letsencrypt-cloudflare"
        external-dns.alpha.kubernetes.io/target: "8.44.158.127"
      className: nginx
      hosts:
        - host: photos.nickknows.net
          paths:
            - path: /
              pathType: Prefix
      tls:
        - secretName: immich-tls
          hosts:
            - photos.nickknows.net