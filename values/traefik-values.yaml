providers:
  kubernetesIngressNginx:
    enabled: true
service:
  enabled: true
  type: LoadBalancer
  externalTrafficPolicy: Local
logs:
  access:
    enabled: true
    format: json
    fields:
      headers:
        defaultMode: drop
        names:
          X-Forwarded-For: keep
ports:
  web:
    forwardedHeaders:
      trustedIPs:
        - 10.0.0.0/8
    transport:
      respondingTimeouts:
        read: 30m
  websecure:
    forwardedHeaders:
      trustedIPs:
        - 10.0.0.0/8
    transport:
      respondingTimeouts:
        read: 30m