{{- if (index .Values "plex" "enable") }}
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: plex
  namespace: argo
spec:
  destination:
    namespace: plex
    server: {{ .Values.spec.destination.server }}
  project: default
  sources:
    - chart: plex-media-server
      repoURL: {{ (index .Values "plex" "source" "repoURL") }}
      targetRevision: {{ (index .Values "plex" "source" "targetRevision") }}
      helm:
        valueFiles: 
          - $sourceRepo/values/plex-values.yaml
    - repoURL: {{ .Values.spec.source.repoURL }}
      targetRevision: {{ .Values.spec.source.targetRevision }}
      ref: sourceRepo
    - repoURL: {{ .Values.spec.source.repoURL }}
      targetRevision: {{ .Values.spec.source.targetRevision }}
      path: manifests/plex/
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
{{- end }}